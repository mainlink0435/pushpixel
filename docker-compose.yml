services:
  pushpixel:
    build: .
    container_name: pushpixel
    restart: unless-stopped
    ports:
      - "1978:1978"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - pushpixel_data:/app
      - /path/to/photos:/photos:ro
    environment:
      - PUSHPIXEL_QUIET=1

volumes:
  pushpixel_data:
