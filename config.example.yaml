# PushPixel Configuration
# Copy this file to config.yaml and fill in your values.

# Minimum required — OAuth credentials from Google Cloud Console.
auth:
  client_id: "your-oauth-client-id"
  client_secret: "your-oauth-client-secret"

# When PUSHPIXEL_DOCKER=1 (set in docker-compose.yml), these default
# to Docker-safe paths automatically:
#   directories:      /photos (mounted via docker-compose)
#   db_path:          /app/data/pushpixel.db
#   log file:         /app/data/pushpixel.log
#   token_dir:        /app/data/
#
# For local use without Docker, uncomment these and adjust paths:

