  <text x="250" y="435" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="36" font-weight="800" fill="url(#gradDark)" text-anchor="middle" letter-spacing="2">PUSHPIXEL</text>
